{% extends "layout.html" %}

{% block title %}Log In{% endblock %}

{% block main %}
    <h2 class="text-center mb-4">Log In</h2>

    <!-- Login form -->
    <form action="/login" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input id="username" class="form-control mx-auto w-auto" name="username" placeholder="Username" type="text" autofocus required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input id="password" class="form-control mx-auto w-auto" name="password" placeholder="Password" type="password" required>
        </div>
        <button class="btn btn-primary" type="submit">Log In</button>
    </form>

    <!-- Error message -->
    {% if error %}
        <div class="alert alert-danger mt-3 text-center">
            {{ error }}
        </div>
    {% endif %}
{% endblock %}
